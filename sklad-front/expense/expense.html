<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Операционные расходы</title>
  </head>
  <body>
    <nav id="navbar">
      <div class="nav-logo">
        <span>Склад Про</span>
        <span id="currentWarehouseName"></span>
      </div>

      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>

      <ul class="nav-links">
        <li data-role="SUPER_ADMIN">
          <a href="/admin/warehouses.html">Склады</a>
        </li>
        <li data-role="ADMIN">
          <a href="/category/categories.html">Категории</a>
        </li>
        <li data-role="ADMIN,SUPER_ADMIN">
          <a href="/currency/currencies.html">Валюта</a>
        </li>
        <li data-role="ADMIN"><a href="/products/products.html">Товары</a></li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/employees/employees.html">Сотрудники</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/clients/clients.html">Клиенты</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/suppliers/suppliers.html">Поставщики</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/expense/expense.html">Расходы</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/write-off/write-off.html">Списания</a>
        </li>
        <li data-role="ADMIN,EMPLOYEE">
          <a href="/checkout/checkout.html">Продажи</a>
        </li>
        <li data-role="ADMIN,EMPLOYEE">
          <a href="/supply/supplies.html">Приход</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/reports/reports.html">Отчеты</a>
        </li>
        <li><a href="/index.html" onclick="logout()">Выход</a></li>
      </ul>
    </nav>

    <div id="alertModal" class="modal" style="display: none">
      <div class="modal-content" style="max-width: 400px; text-align: center">
        <h3 id="alertTitle">Уведомление</h3>
        <p id="alertMessage" style="margin: 20px 0"></p>
        <div class="modal-buttons">
          <button
            id="alertCloseBtn"
            class="btn"
            style="width: 100%; padding: 10px; cursor: pointer"
          >
            Понятно
          </button>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="header-row">
        <h1>Операционные расходы</h1>
        <button class="btn-add" onclick="openExpenseModal()">
          + Добавить расход
        </button>
      </div>

      <div class="search-box">
        <div class="flex_it">
          <div class="filter-group">
            <label>От:</label>
            <input type="date" id="filterFrom" onchange="applyFilters()" />
          </div>
          <div class="filter-group">
            <label>До:</label>
            <input type="date" id="filterTo" onchange="applyFilters()" />
          </div>
        </div>
        <button onclick="clearFilters()">Сброс</button>
      </div>

      <table id="expenseTable">
        <thead>
          <tr>
            <th>Дата</th>
            <th>Категория</th>
            <th>Сумма</th>
            <th>Комментарий</th>
          </tr>
        </thead>
        <tbody id="expenseBody"></tbody>
      </table>
    </div>

    <div id="expenseModal" class="modal" style="display: none">
      <div class="modal-content">
        <h3>Регистрация расхода</h3>
        <div class="form-group">
          <label>Категория:</label>
          <select id="expCategory">
            <option value="Зарплата">Зарплата</option>
            <option value="Аренда">Аренда</option>
            <option value="Коммунальные">Коммунальные услуги</option>
            <option value="Налоги">Налоги</option>
            <option value="Маркетинг">Маркетинг/Реклама</option>
            <option value="Хоз.нужды">Хоз. нужды</option>
            <option value="Прочее">Прочее</option>
          </select>
        </div>
        <div class="form-group">
          <label>Сумма:</label>
          <input type="number" id="expAmount" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label>Описание:</label>
          <input
            type="text"
            id="expDesc"
            placeholder="Например: Аванс охраннику"
          />
        </div>
        <div class="modal-buttons">
          <button onclick="closeExpenseModal()">Отмена</button>
          <button onclick="saveExpense()">Сохранить</button>
        </div>
      </div>
    </div>

    <script src="expense.js"></script>
    <script src="/nav-guard.js"></script>
  </body>
</html>
