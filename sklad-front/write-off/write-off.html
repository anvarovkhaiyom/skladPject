  </head>

      <div class="nav-logo">

        <span id="currentWarehouseName"></span>
      </div>

      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>

      <ul class="nav-links">
        <li data-role="SUPER_ADMIN">
          <a href="/admin/warehouses.html">Склады</a>
        </li>
        <li data-role="ADMIN">
          <a href="/category/categories.html">Категории</a>
        </li>
        <li data-role="ADMIN,SUPER_ADMIN">
          <a href="/currency/currencies.html">Валюта</a>
        </li>
        <li data-role="ADMIN"><a href="/products/products.html">Товары</a></li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/employees/employees.html">Сотрудники</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/clients/clients.html">Клиенты</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/suppliers/suppliers.html">Поставщики</a>
        </li>
        <li data-role="ADMIN,EMPLOYEE">
          <a href="/checkout/checkout.html">Продажи</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/expense/expense.html">Расходы</a>
        </li>
        <li data-role="SUPER_ADMIN,ADMIN">
          <a href="/write-off/write-off.html">Списания</a>
        </li>

        <li data-role="SUPER_ADMIN,ADMIN">

        </li>
        <li><a href="/index.html" onclick="logout()">Выход</a></li>
      </ul>
    </nav>

    <div id="alertModal" class="modal" style="display: none">
      <div class="modal-content" style="max-width: 400px; text-align: center">
        <h3 id="alertTitle">Уведомление</h3>
        <p id="alertMessage" style="margin: 20px 0"></p>
        <div class="modal-buttons">
          <button
            id="alertCloseBtn"
            class="btn"
            style="width: 100%; padding: 10px; cursor: pointer"
          >
            Понятно
          </button>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="header-row">
        <h1>Списание товара (Брак / Порча)</h1>
      </div>

      <div class="search-box" style="margin-bottom: 20px">
        <input
          type="text"
          id="prodSearch"
          placeholder="Имя, штрих-код или артикул..."
          oninput="searchProducts(this.value)"
          autocomplete="off"
        />
        <div id="searchResults" class="search-dropdown"></div>
      </div>

      <div
        id="writeOffForm"
        style="
          display: none;
          background: #fff;
          padding: 20px;
          border-radius: 8px;
        "
      >
        <h3 id="selectedProdName">Товар: ---</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Количество для списания:</label>
            <input type="number" id="woQty" step="0.01" />
          </div>
          <div class="form-group">
            <label>Причина:</label>
            <select id="woReason">
              <option value="Брак">Брак / Повреждение</option>
              <option value="Срок годности">Истек срок годности</option>
              <option value="Инвентаризация">Недостача (инвентаризация)</option>
              <option value="Личное">Личное использование</option>
            </select>
          </div>
        </div>
        <button
          class="btn-add"
          style="margin-top: 15px"
          onclick="submitWriteOff()"
        >
          Оформить списание
        </button>
      </div>
    </div>
    <script src="write-off.js"></script>
    <script src="/nav-guard.js"></script>
  </body>
</html>
